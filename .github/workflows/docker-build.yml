name: Build Docker Image

on:
  release:
    types: [created, published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve tags
        id: tags
        run: |
          if [ "${{ github.event.release.draft }}" = "true" ]; then
            echo "tags=ghcr.io/${{ github.repository }}:draft" >> $GITHUB_OUTPUT
          else
            printf 'tags=ghcr.io/${{ github.repository }}:latest\nghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}\n' >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./docker-image/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
