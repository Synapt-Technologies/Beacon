name: Build Pi Image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET_BRANCH: ${{ github.event.release.target_commitish || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Patch target branch into pi-image config
        run: |
          sed -i "s|--branch [^ ]*|--branch ${{ env.TARGET_BRANCH }}|" \
            pi-image/layer/beacon-app.yaml

      - name: Install QEMU and binfmt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64 || true
          sudo modprobe nbd || echo "WARNING: nbd module unavailable"

      - name: Clone rpi-image-gen
        run: git clone --depth 1 https://github.com/raspberrypi/rpi-image-gen.git /tmp/rpi-image-gen

      - name: Install rpi-image-gen dependencies
        run: sudo /tmp/rpi-image-gen/install_deps.sh

      - name: Build
        run: |
          mkdir -p /tmp/beacon-work/work
          /tmp/rpi-image-gen/rpi-image-gen build \
            -S "${{ github.workspace }}/pi-image" \
            -c beacon.yaml \
            -B /tmp/beacon-work/work

      - name: Compress image to .xz
        run: |
          IMG_DIR="/tmp/beacon-work/work/image-Beacon"
          shopt -s nullglob
          IMAGES=("${IMG_DIR}"/*.img)

          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "ERROR: No .img files found in ${IMG_DIR}"
            ls -la "${IMG_DIR}" || true
            exit 1
          fi

          for img in "${IMAGES[@]}"; do
            xz -v -T0 -6 -f "${img}"
          done

      - name: Rename image
        run: |
          IMG_DIR="/tmp/beacon-work/work/image-Beacon"
          shopt -s nullglob
          IMAGES=("${IMG_DIR}"/*.img.xz)
          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "ERROR: No .img.xz files found in ${IMG_DIR}"
            ls -la "${IMG_DIR}" || true
            exit 1
          fi
          if [ ${#IMAGES[@]} -ne 1 ]; then
            echo "ERROR: Expected exactly one .img.xz file in ${IMG_DIR}, found ${#IMAGES[@]}"
            printf 'Matched files:\n%s\n' "${IMAGES[@]}"
            ls -la "${IMG_DIR}" || true
            exit 1
          fi
          mv "${IMAGES[0]}" "${IMG_DIR}/Beacon_PI3_PI4.img.xz"

      - name: Upload to release
        if: github.event_name == 'release'
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/beacon-work/work/image-Beacon/Beacon_PI3_PI4.img.xz \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Beacon_PI3_PI4
          path: /tmp/beacon-work/work/image-Beacon/Beacon_PI3_PI4.img.xz
